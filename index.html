<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAPG Studio | Kids Gaming</title>
    <style>
        /* This is the CSS - it makes the site look cool! */
        body {
            background-color: #FFDE59; /* Bright yellow background */
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #FF5757; /* Fun red header */
            padding: 20px;
            color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .container {
            padding: 50px;
        }
        .game-card {
            background: white;
            border: 5px solid #5271FF;
            border-radius: 20px;
            display: inline-block;
            padding: 20px;
            margin: 20px;
            width: 250px;
            transition: transform 0.2s;
        }
        .game-card:hover {
            transform: scale(1.1); /* Pops out when you hover! */
        }
        .btn {
            background-color: #7ED957; /* Bright green button */
            border: none;
            color: white;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <h1>🎮 LAPG Studio 🎮</h1>
        <p>The Ultimate Fun Zone for Kids!</p>
    </header>

    <div class="container">
        <h2>Our Awesome Games</h2>
        
        <div class="game-card">
            <h3>Space Explorer</h3>
            <p>Fly through the stars!</p>
            <button class="btn">Play Now</button>
        </div>

        <div class="game-card">
            <h3>Dino Dash</h3>
            <p>Run fast, little T-Rex!</p>
            <button class="btn">Play Now</button>
        </div>
    </div>

</body>
</html>
