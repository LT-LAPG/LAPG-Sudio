<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAPG Studio | Mega Game Hub</title>
    <style>
        body {
            background-color: #f0f4f8;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            text-align: center;
        }
        nav {
            background-color: #5271FF;
            padding: 15px;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
        }
        header {
            background: linear-gradient(135deg, #FF5757, #FFDE59);
            padding: 60px 20px;
            color: white;
        }
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 40px;
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            transition: 0.3s;
        }
        .card:hover {
            transform: translateY(-10px);
            border: 3px solid #7ED957;
        }
        /* This styles our link to look like a cool button */
        .play-btn {
            background-color: #7ED957;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 10px;
            display: inline-block;
            margin-top: 10px;
        }
        .play-btn:hover {
            background-color: #5cbf36;
        }
        footer {
            background: #333;
            color: white;
            padding: 20px;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">🏠 Home</a>
        <a href="game.html">🎮 Games</a>
        <a href="#">🏆 High Scores</a>
    </nav>

    <header>
        <h1>LAPG STUDIO</h1>
        <p>The biggest collection of kid games on GitHub!</p>
    </header>

    <div class="game-grid">
        <div class="card">
            <h3>Space Explorer</h3>
            <p>Fly through the stars!</p>
            <a href="game.html" class="play-btn">Play Now</a>
        </div>
        
        <div class="card">
            <h3>Pizza Maker</h3>
            <p>Cook the best pizza!</p>
            <a href="game.html" class="play-btn">Play Now</a>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 LAPG Studio - Made by LT-LAPG</p>
    </footer>

</body>
</html>
