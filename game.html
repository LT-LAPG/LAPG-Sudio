<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAPG Studio | Neon Game Hub</title>
    <style>
        /* NEON CARTOON VIBES */
        body {
            background-color: #0b0c10; /* Super dark background */
            color: white;
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            text-align: center;
            margin: 0;
        }
        
        nav {
            background-color: #1f2833;
            padding: 15px;
            border-bottom: 4px solid #0ff; /* Neon cyan border */
            box-shadow: 0 0 15px #0ff; /* Glowing effect */
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        nav a, .settings-btn {
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            background: #ff007f; /* Neon pink */
            padding: 10px 20px;
            border-radius: 10px;
            border: 3px solid #fff;
            cursor: pointer;
            box-shadow: 0 0 10px #ff007f;
        }

        h1 {
            color: #c5c6c7;
            text-shadow: 2px 2px #ff007f, -2px -2px #0ff; /* Cartoon 3D text effect */
            font-size: 40px;
        }

        .main-layout {
            display: flex;
            justify-content: space-around;
            padding: 20px;
        }

        /* The Game Box */
        .game-box {
            background-color: #121212;
            border: 6px dashed #39ff14; /* Neon lime green */
            box-shadow: 0 0 20px #39ff14;
            border-radius: 20px;
            width: 50%;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        /* Side Panels for Chat and Leaderboard */
        .side-panel {
            background-color: #1f2833;
            border: 4px solid #0ff;
            box-shadow: 0 0 15px #0ff;
            border-radius: 15px;
            width: 20%;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        .chat-box {
            flex-grow: 1;
            background: #0b0c10;
            border-radius: 10px;
            margin-bottom: 10px;
            padding: 10px;
            overflow-y: auto;
            text-align: left;
            font-size: 14px;
            height: 200px;
        }

        .chat-input {
            width: 90%;
            padding: 10px;
            border-radius: 10px;
            border: 2px solid #ff007f;
            background: black;
            color: white;
            font-family: inherit;
        }

        .player {
            background: #ff007f;
            margin: 8px 0;
            padding: 8px;
            border-radius: 8px;
            border: 2px solid white;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }

        /* Settings Pop-up (Hidden by default) */
        #settings-modal {
            display: none;
            position: fixed;
            top: 20%;
            left: 35%;
            width: 30%;
            background: #1f2833;
            border: 5px solid #39ff14;
            box-shadow: 0 0 30px #39ff14;
            padding: 30px;
            border-radius: 20px;
            z-index: 100;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">🏠 Home</a>
        <button class="settings-btn" onclick="toggleSettings()">⚙️ Settings</button>
    </nav>

    <h1>⚡ LAPG STUDIO ⚡</h1>

    <div class="main-layout">
        <div class="side-panel">
            <h3 style="color: #0ff;">🟢 Online Now</h3>
            <div id="online-players">
                <div class="player"><span>LT-LAPG</span> <span>Admin</span></div>
            </div>
        </div>

        <div class="game-box">
            <p>🎮 Neon Game Loading... 🎮</p>
        </div>

        <div class="side-panel">
            <h3 style="color: #ff007f;">💬 Live Chat</h3>
            <div class="chat-box" id="chat-messages">
                <p><b>System:</b> Welcome to the server, LT-LAPG!</p>
            </div>
            <input type="text" class="chat-input" id="my-message" placeholder="Type a message..." onkeypress="sendMessage(event)">
        </div>
    </div>

    <div id="settings-modal">
        <h2 style="color: #39ff14;">Settings</h2>
        <p>Music Volume: <input type="range" min="1" max="100" value="50"></p>
        <p>Sound Effects: <input type="checkbox" checked></p>
        <button class="settings-btn" onclick="toggleSettings()">Close</button>
    </div>

    <script>
        // Open and close settings
        function toggleSettings() {
            let modal = document.getElementById("settings-modal");
            if (modal.style.display === "block") {
                modal.style.display = "none";
            } else {
                modal.style.display = "block";
            }
        }

        // Send a chat message
        function sendMessage(event) {
            if (event.key === "Enter") {
                let input = document.getElementById("my-message");
                let chatBox = document.getElementById("chat-messages");
                
                if (input.value.trim() !== "") {
                    chatBox.innerHTML += `<p><b>LT-LAPG:</b> ${input.value}</p>`;
                    input.value = ""; // Clear the box
                    chatBox.scrollTop = chatBox.scrollHeight; // Scroll to bottom
                }
            }
        }

        // Simulate real people joining and chatting
        let fakeUsers = ["ProGamer2026", "NeonNinja", "PixelKid", "CodeWizard"];
        let fakeMessages = ["Whoa this site is cool!", "Anyone want to play Space Explorer?", "Hello from the internet!", "LT-LAPG makes the best games."];

        setInterval(function() {
            // Pick a random fake user
            let randomUser = fakeUsers[Math.floor(Math.random() * fakeUsers.length)];
            
            // Add them to the online list
            let playerList = document.getElementById("online-players");
            playerList.innerHTML += `<div class="player"><span>${randomUser}</span> <span>Online</span></div>`;

            // Make them say a random message in chat
            let randomMsg = fakeMessages[Math.floor(Math.random() * fakeMessages.length)];
            let chatBox = document.getElementById("chat-messages");
            chatBox.innerHTML += `<p style="color: #0ff;"><b>${randomUser}:</b> ${randomMsg}</p>`;
            chatBox.scrollTop = chatBox.scrollHeight;

        }, 8000); // Happens every 8 seconds!
    </script>

</body>
</html>
