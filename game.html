<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAPG Studio | Game Page</title>
    <style>
        body {
            background-color: #1E1E24; /* Cool dark background */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
        }
        nav {
            background-color: #5271FF;
            padding: 15px;
        }
        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            margin: 0 15px;
        }
        .container {
            display: flex;
            justify-content: space-around;
            padding: 20px;
            margin-top: 20px;
        }
        .game-box {
            background-color: #2b2b36;
            border: 5px dashed #FFDE59;
            border-radius: 15px;
            width: 60%;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .leaderboard {
            background-color: #FF5757;
            border-radius: 15px;
            width: 30%;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        .player {
            background: white;
            color: black;
            margin: 10px 0;
            padding: 10px;
            border-radius: 10px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">🏠 Back to Home</a>
        <a href="#">💬 Chat Room (Coming Soon)</a>
    </nav>

    <h1>Space Explorer - Play Now!</h1>

    <div class="container">
        <div class="game-box">
            <p>🎮 Your Game Will Go Here! 🎮</p>
        </div>

        <div class="leaderboard">
            <h2>🏆 Live Leaderboard</h2>
            <div class="player"><span>Player 1:</span> <span id="score1">1500</span></div>
            <div class="player"><span>LT-LAPG:</span> <span id="score2">1200</span></div>
            <div class="player"><span>ProGamer:</span> <span id="score3">950</span></div>
        </div>
    </div>

    <script>
        // This function creates random numbers to pretend the scores are updating
        function updateScores() {
            document.getElementById("score1").innerText = Math.floor(Math.random() * 2000) + 1000;
            document.getElementById("score2").innerText = Math.floor(Math.random() * 2000) + 1000;
            document.getElementById("score3").innerText = Math.floor(Math.random() * 2000) + 500;
        }

        // This tells the computer: Run the 'updateScores' function every 5000 milliseconds (5 seconds!)
        setInterval(updateScores, 5000);
    </script>

</body>
</html>
